<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Naturforschung & protestantische Mission</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    >
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    >
    <link rel="stylesheet" href="css/site.css">
  </head>
  <body>
    <header class="border-bottom bg-white sticky-top">
      <div class="container-fluid py-3">
        <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
          <div>
            <h1 class="h3 mb-1">Naturforschung & protestantische Mission</h1>
            <p class="text-body-secondary mb-0">Personenbrowser auf Basis von <code>persons.wikidata.enriched.json</code></p>
          </div>
        </div>
      </div>
    </header>

    <main class="container-fluid py-4">
      <div id="loading-state" class="alert alert-info">Daten werden geladen...</div>
      <div id="error-state" class="alert alert-danger d-none"></div>

      <div id="app-shell" class="d-none">
        <div class="row g-4 align-items-stretch">
          <section class="col-12 col-lg-3">
            <div class="card panel-card h-100">
              <div class="card-header bg-transparent">
                <h2 class="h5 mb-0">Personen</h2>
              </div>
              <div class="card-body">
                <div class="mb-3">
                  <input id="person-search" class="form-control" type="search" placeholder="Person suchen...">
                </div>
                <div id="person-browser" class="list-group person-browser"></div>
              </div>
            </div>
          </section>

          <section class="col-12 col-lg-6">
            <div class="card panel-card h-100">
              <div class="card-header bg-transparent">
                <h2 class="h5 mb-0">Person Article</h2>
              </div>
              <div class="card-body">
                <article id="person-article" class="article-panel"></article>
              </div>
            </div>
          </section>

          <section class="col-12 col-lg-3">
            <div class="card panel-card h-100">
              <div class="card-header bg-transparent">
                <h2 class="h5 mb-0">Metadaten & Links</h2>
              </div>
              <div class="card-body">
                <div id="person-metadata" class="metadata-compact"></div>
                <hr class="my-3">
                <div id="person-links" class="link-list"></div>
              </div>
            </div>
          </section>
        </div>

        <div class="row g-4 mt-1">
          <section class="col-12">
            <div class="card panel-card">
              <div class="card-header bg-transparent d-flex flex-column flex-lg-row justify-content-between gap-2">
                <h2 class="h5 mb-0">Map</h2>
                <div id="map-summary" class="small text-body-secondary"></div>
              </div>
              <div class="card-body">
                <div class="map-shell">
                  <div id="person-map"></div>
                  <div id="map-empty-state" class="map-empty d-none">Keine Orte fuer die Karte verfuegbar.</div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
